# ------------------------------
# Surge Configuration
# Author: Kerwin
# Reviewed & Optimized by ChatGPT / Claude
# Based on:
# - Surge Official Manual
# - Community Best Practices (@SukkaW / @Loyalsoldier / SKK)
# ------------------------------


[General]

# ------------------------------
# 基础设置
# ------------------------------

loglevel = notify
ipv6 = false
ipv6-vif = auto

# ------------------------------
# 网络行为优化
# ------------------------------

# Wi-Fi Assist（在网络切换时更稳定）
wifi-assist = true
# Hybrid Network（部分网络环境下会导致异常，关闭更稳）
all-hybrid = false
# UDP 优先级
udp-priority = true

# ------------------------------
# 连通性测试
# ------------------------------

# 系统联网检测
internet-test-url = http://connectivitycheck.platform.hicloud.com/generate_204
# 代理连通性检测
proxy-test-url = http://latency-test.skk.moe/endpoint
# UDP 测试地址
proxy-test-udp = www.apple.com@64.6.64.6
# 测试超时时间（秒）
test-timeout = 3

# ------------------------------
# GeoIP 数据库
# ------------------------------

geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
disable-geoip-db-auto-update = false

# ------------------------------
# Wi-Fi / 热点访问
# ------------------------------

# 不作为 Wi-Fi 代理使用
allow-wifi-access = false
# 允许热点共享
allow-hotspot-access = true

# ------------------------------
# 控制接口（⚠️ 仅本机监听，避免安全风险）
# ------------------------------

http-listen = 127.0.0.1:6152
socks5-listen = 127.0.0.1:6153
http-api = surge@127.0.0.1:6166
http-api-tls = true
http-api-web-dashboard = true
external-controller-access = surge@127.0.0.1:6160

# ------------------------------
# 兼容性
# ------------------------------

compatibility-mode = 0
use-default-policy-if-wifi-not-primary = false

# ------------------------------
# 直连地址（不走代理）
# ------------------------------

skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32

exclude-simple-hostnames = true

# ------------------------------
# DNS 设置
# ------------------------------

read-etc-hosts = true
use-local-host-item-for-proxy = true

# 加密 DNS（设为 false，避免与下方明文国内 DNS 混用产生泄露风险）
encrypted-dns-follow-outbound-mode = false
encrypted-dns-server = quic://223.5.5.5, quic://223.6.6.6, https://doh.pub/dns-query, https://dns.alidns.com/dns-query

# 国内 DNS + 系统 DNS
dns-server = 223.5.5.5, 223.6.6.6, system

# DNS 劫持（防止系统绕过）
hijack-dns = 8.8.8.8:53, 8.8.4.4:53

# DNS 缓存优化
dns-failed-record-expiry = 3600

# ------------------------------
# 始终使用真实 IP 的域名（游戏 / 网络检测）
# ------------------------------

always-real-ip = *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, stun.l.google.com

# ------------------------------
# 高级设置
# ------------------------------

include-all-networks = false
include-local-networks = false
show-error-page-for-reject = true
udp-policy-not-supported-behaviour = REJECT
enhanced-mode-by-rule = false


# ------------------------------
# 代理定义
# ------------------------------

[Proxy]

"Reject-tinygif" = reject-tinygif
"Reject-no-Drop" = reject-no-drop
"Reject-Drop" = reject-drop
"Reject" = reject
"Direct" = direct

# ------------------------------
# 策略组
# ------------------------------

[Proxy Group]

# ======== 主策略 ========
"Final" = select, "Proxy", "Domestic", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Final.png
"Proxy" = select, "LXY", "ENET", "Korea", "Japan", "Taiwan", "Singapore", "Hong Kong", "United States", "United Kingdom", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Proxy.png
"Domestic" = select, Direct, "Proxy", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Domestic.png

# ======== 功能策略 ========
"AIGC" = select, "Proxy", "Korea", "Japan", "Taiwan", "Singapore", "Hong Kong", "United States", "United Kingdom", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/AI.png
"Apple" = select, "Domestic", "Hong Kong", "United States", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Apple.png
"Social" = select, "Proxy", "Korea", "Japan", "Taiwan", "Singapore", "Hong Kong", "United States", "United Kingdom", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/ForeignMedia.png
"Google" = select, "Proxy", "United States", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Google_Search.png
"Microsoft" = select, "Proxy", "Domestic", "Singapore", "Hong Kong", "United States", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Microsoft.png
"Speedtest" = select, "Domestic", "Proxy", "ENET", "LXY", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Speedtest.png
"Streaming" = select, "Proxy", "Korea", "Japan", "Taiwan", "Singapore", "Hong Kong", "United States", "United Kingdom", icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Streaming.png

# ======== 订阅节点 ========
"ENET" = smart, policy-path=[你的订阅链接], policy-regex-filter=^((?!Remain|Expired|官网|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Rocket.png

# ======== 区域智能分组 ========
"Korea" = smart, policy-regex-filter=韩国|Korea|KR|🇰🇷, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Korea.png
"Japan" = smart, policy-regex-filter=🇯🇵|日本|JP|Japan, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Japan.png
"Taiwan" = smart, policy-regex-filter=🇹🇼|台湾|TW|Tai, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Taiwan.png
"Germany" = smart, policy-regex-filter=(?i)🇩🇪|德国|德國|Germany|German|DE\b|DE-|GER\b|Frankfurt|Berlin|Hamburg, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Germany.png
"Singapore" = smart, policy-regex-filter=🇸🇬|新加坡|狮城|SG|Singapore, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Singapore.png
"Hong Kong" = smart, policy-regex-filter=🇭🇰|港|香港|HK|Hong|Hong Kong, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/Hong_Kong.png
"United States" = smart, policy-regex-filter=🇺🇸|美国|US|States|American, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/United_States.png
"United Kingdom" = smart, policy-regex-filter=🇬🇧|英国|英|英格兰|UK|United Kingdom, include-other-group="ENET", hidden=0, icon-url=https://icon.kerwin.dpdns.org/IconSet/Color/United_Kingdom.png

